stages:
  - test
  - build
  - security

include:
  - project: 'meganerd/ci-templates'
    file: '/go/test.yml'
    ref: 'v1.0.1'
  - project: 'meganerd/ci-templates'
    file: '/go/lint.yml'
    ref: 'v1.0.1'
  - project: 'meganerd/ci-templates'
    file: '/go/build.yml'
    ref: 'v1.0.1'
  - project: 'meganerd/ci-templates'
    file: '/go/security.yml'
    ref: 'v1.0.1'

variables:
  GO_IMAGE: "golang:1.26"
  GOLANGCI_LINT_IMAGE: "golangci/golangci-lint:v2.11"
  GO_BUILD_PATH: "./cmd/pi-go/"
  GO_BINARY_NAME: "pi-go"
  GO_VERSION_PKG: "github.com/meganerd/pi-go/internal/version"
  GO_TEST_EXTRA_PACKAGES: "ripgrep"
  GIT_DEPTH: 0
  GIT_STRATEGY: clone
