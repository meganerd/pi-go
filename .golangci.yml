version: "2"
linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosec
    - ineffassign
    - depguard
    - gomoddirectives
  settings:
    errcheck:
      exclude-functions:
        - (*os.File).Close
        - (io.Closer).Close
        - (io.ReadCloser).Close
        - (net/http.ResponseWriter).Write
        - (*encoding/json.Encoder).Encode
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Print
        - fmt.Println
        - fmt.Printf
    gosec:
      excludes:
        - G304
    depguard:
      rules:
        main:
          deny:
            - pkg: "github.com/!(!charmbracelet|!meganerd).*"
              desc: "Only charmbracelet and meganerd packages are allowed as external deps"
          allow:
            - $gostd
            - github.com/meganerd/
            # Bubbletea TUI ecosystem
            - github.com/charmbracelet/
            - github.com/muesli/
            - github.com/erikgeiser/
            - github.com/rivo/uniseg
            # Bubbletea transitive dependencies
            - github.com/aymanbagabas/
            - github.com/clipperhouse/
            - github.com/lucasb-eyer/
            - github.com/mattn/
            - github.com/xo/
            - github.com/atotto/
            - github.com/MakeNowJust/
            - golang.org/x/
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
      - text: "Error return value of .*.Close"
        linters:
          - errcheck
